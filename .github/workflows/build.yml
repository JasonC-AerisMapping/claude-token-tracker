name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build exe
        run: pyinstaller PromptLedger.spec --noconfirm

      - name: Build installer
        run: |
          choco install innosetup -y --no-progress
          iscc installer.iss

      - name: Upload Windows exe
        uses: actions/upload-artifact@v4
        with:
          name: PromptLedger-Windows-exe
          path: dist/PromptLedger.exe

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: PromptLedger-Windows-Setup
          path: installer_output/PromptLedger_Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build macOS app
        run: pyinstaller PromptLedger.spec --noconfirm

      - name: Create DMG
        run: |
          mkdir -p dmg_contents
          if [ -d "dist/PromptLedger.app" ]; then
            cp -r dist/PromptLedger.app dmg_contents/
          else
            cp dist/PromptLedger dmg_contents/
          fi
          hdiutil create -volname "Prompt Ledger" -srcfolder dmg_contents -ov -format UDZO PromptLedger.dmg

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: PromptLedger-macOS
          path: PromptLedger.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PromptLedger-Windows-exe/PromptLedger.exe
            artifacts/PromptLedger-Windows-Setup/PromptLedger_Setup.exe
            artifacts/PromptLedger-macOS/PromptLedger.dmg
          generate_release_notes: true
